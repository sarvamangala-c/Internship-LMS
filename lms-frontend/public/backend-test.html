<!DOCTYPE html>
<html>
<head>
    <title>Backend Connection Test</title>
</head>
<body>
    <h1>Backend Connection Test</h1>
    <div id="result"></div>
    
    <script>
        async function testBackend() {
            const resultDiv = document.getElementById('result');
            const apiUrl = 'http://localhost:8000';
            
            try {
                console.log('Testing backend connection to:', apiUrl);
                
                const response = await fetch(`${apiUrl}/api/v1/health`, {
                    method: 'GET',
                    timeout: 5000
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<h2 style="color: green;">✅ Backend Connected!</h2><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<h2 style="color: orange;">⚠️ Backend Responding but with error:</h2><p>Status: ${response.status}</p>`;
                }
            } catch (error) {
                console.error('Backend connection failed:', error);
                resultDiv.innerHTML = `<h2 style="color: red;">❌ Backend Connection Failed</h2><p>Error: ${error.message}</p><p>Make sure your backend server is running on ${apiUrl}</p>`;
            }
        }
        
        // Test on page load
        testBackend();
        
        // Also test every 5 seconds
        setInterval(testBackend, 5000);
    </script>
</body>
</html>
